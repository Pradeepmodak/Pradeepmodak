name: Update GitHub Profile README Stats

on:
  schedule:
    # Runs automatically every 24 hours at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Recent Activity
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Keep Profile Alive
        run: |
          echo "Profile synced on $(date)" > .profile_sync

      - name: Commit and Push sync file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .profile_sync
          git diff --cached --quiet || git commit -m "chore(auto): daily profile sync [skip ci]"
          git push
