name: Update GitHub Profile README Stats

on:
  schedule:
    # Runs automatically every 24 hours at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Recent Activity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Keep Profile Alive
        run: |
          echo "Profile synced on $(date)" > .profile_sync
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .profile_sync
          git commit -m "chore(auto): daily profile sync and stats verification [skip ci]" || echo "No changes needed"
          git push
